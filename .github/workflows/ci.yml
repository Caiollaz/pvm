name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: shellcheck -s bash bin/pvm bin/php bin/composer src/*.sh install.sh uninstall.sh tests/*.sh

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite
        run: ./tests/test_pvm.sh

  e2e:
    name: End-to-end (Docker)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3", "8.4"]
    steps:
      - uses: actions/checkout@v4
      - name: Install pvm from checkout
        run: ./install.sh
      - name: pvm install / use / run php
        run: |
          export PATH="$HOME/.pvm/bin:$PATH"
          pvm install "${{ matrix.php }}"
          pvm use "${{ matrix.php }}"
          pvm current
          pvm list
          php -v
          php -r 'echo "hello from " . PHP_VERSION . PHP_EOL;'
      - name: composer works
        run: |
          export PATH="$HOME/.pvm/bin:$PATH"
          composer -V
      - name: pvm doctor
        run: |
          export PATH="$HOME/.pvm/bin:$PATH"
          pvm doctor
